{
    "layer": "top",
    "modules-left": ["custom/launcher","cpu","memory","tray","niri/window"],
    "modules-center": ["clock"],
    "modules-right": ["niri/workspaces", "pulseaudio", "network", "backlight", "battery", "custom/notification" ],
    
    "pulseaudio": {
        "tooltip": false,
        "scroll-step": 2,
        "format": "{icon} {volume}%",
        "format-bluetooth": "{icon} {volume}%",
        "format-muted": "{icon} MUTED",
        "on-click": "pavucontrol",
        "format-icons": {
            "headphones": "",
            "default": ["", "", ""]
        }
    },
    "niri/window": {
        "format": "{}",
        "rewrite": {
            "(.*) - Mozilla Firefox": "🌎 $1",
            "(.*) - zsh": "> [$1]"
        }
    },
    "niri/workspaces": {
        "format": "{icon}",
        "format-icons": {
            "dev": "",
            "browser": "",
            "chat": "",
            "gaming": "󰺵",
            "active": "",
            "default": ""
        }
    },
    "network": {
        "tooltip-format": "{essid}",
        "format-wifi": " ",
        "format-ethernet": "",
        "format-disconnected": "⚠ Disconnected",
        "on-click": "kitty nmtui",
    },
    "backlight": {
        "tooltip": false,
        "format": " {}%",
        "interval": 1,
        "on-scroll-up": "brightnessctl --device amdgpu_bl2 set 2%+",
        "on-scroll-down": "brightnessctl --device amdgpu_bl2 set 2%-"
    },
    "battery": {
            "states": {
                    "good": 95,
                    "warning": 40,
                    "critical": 20
            },
            "format": "{icon}  {capacity}%",
            "format-charging": " {capacity}%",
            "format-plugged": " {capacity}%",
            "format-alt": "{time} {icon}",
            "format-icons": ["", "", "", "", ""],
    },
    "tray":{
        "icon-size":18,
        "spacing": 10
    },
    "clock": {
        "format": "<b>{:%H:%M}</b>",
        "tooltip-format": "<big>{:%Y-%m-%d %A %Z}</big>",
        "on-click-right": "kitty calcure"
    },
    "cpu": {
        "interval": 10,
        "format": " {}%",
        "max-length": 10,
        "on-click": "kitty btop"
    },
    "memory": {
            "interval": 30,
        "format": " {}%",
        "max-length": 10,
        "on-click": "missioncenter"
    },
    "custom/launcher":{
            "format": "󱄅",
            "on-click": "wofi --show drun --term kitty",
            "on-click-right": "wofi --show run --term kitty"
        },
        "custom/notification": {
    "tooltip": true,
    "format": "<span size='16pt'>{icon}</span>",
    "format-icons": {
      "notification": "󱅫",
      "none": "󰂜",
      "dnd-notification": "󰂠",
      "dnd-none": "󰪓",
      "inhibited-notification": "󰂛",
      "inhibited-none": "󰪑",
      "dnd-inhibited-notification": "󰂛",
      "dnd-inhibited-none": "󰪑"
    },
    "return-type": "json",
    "exec-if": "which swaync-client",
    "exec": "swaync-client -swb",
    "on-click": "swaync-client -t -sw",
    "on-click-right": "swaync-client -d -sw",
    "escape": true
  }
}
