{
    "layer": "top",
    "modules-left": ["custom/launcher","cpu","memory","tray","niri/window"],
    "modules-center": ["clock"],
    "modules-right": ["niri/workspaces", "pulseaudio", "network", "backlight", "battery", "custom/notification" ],
    
    "pulseaudio": {
        "tooltip": false,
        "scroll-step": 2,
        "format": "{icon} {volume}%",
        "format-bluetooth": "{icon}ΎΛΦ {volume}%",
        "format-muted": "{icon} MUTED",
        "on-click": "pavucontrol",
        "smooth-scrolling-threshold": 1.5,
        "reverse-scrolling": true,
        "format-icons": {
            "headphones": "ΎΑξ",
            "default": ["ΎΑο", "ΎΑπ", "ΎΑρ"]
        }
    },
    "niri/window": {
        "format": "{}",
        "rewrite": {
            "(.*) - Mozilla Firefox": "ΏθΝΟ $1",
            "(.*) - zsh": "> [$1]"
        }
    },
    "niri/workspaces": {
        "format": "{icon}",
        "format-icons": {
            "dev": "ΎΤΚ",
            "browser": "ΌζΖ",
            "chat": "ΎΒ╡",
            "gaming": "≤░║╡",
            "active": "ΎΗΤ",
            "default": "ΎΕΣ"
        }
    },
    "network": {
        "tooltip-format": "{essid}",
        "format-wifi": "ΎΘτ ",
        "format-ethernet": "Ό╜Ε",
        "format-disconnected": "έγι Disconnected",
        "on-click": "kitty nmtui",
    },
    "backlight": {
        "tooltip": false,
        "format": "ΎΔτ {}%",
        "interval": 1,
        "on-scroll-up": "brightnessctl --device amdgpu_bl2 set 2%+",
        "on-scroll-down": "brightnessctl --device amdgpu_bl2 set 2%-",
        "smooth-scrolling-threshold": 1.5,
        "reverse-scrolling": true,
    },
    "battery": {
            "states": {
                    "good": 95,
                    "warning": 40,
                    "critical": 20
            },
            "format": "{icon}  {capacity}%",
            "format-charging": "ΎΘο {capacity}%",
            "format-plugged": "ΎΘο {capacity}%",
            "format-alt": "{time} {icon}",
            "format-icons": ["ΎΚΕ", "ΎΚΔ", "ΎΚΓ", "ΎΚΒ", "ΎΚΑ"],
    },
    "tray":{
        "icon-size":18,
        "spacing": 10
    },
    "clock": {
        "format": "<b>{:%H:%M}</b>",
        "tooltip-format": "<big>{:%Y-%m-%d %A %Z}</big>",
        "on-click-right": "kitty calcure"
    },
    "cpu": {
        "interval": 10,
        "format": "ΎΜδ {}%",
        "max-length": 10,
        "on-click": "kitty btop"
    },
    "memory": {
            "interval": 30,
        "format": "ΎΔΚ {}%",
        "max-length": 10,
        "on-click": "missioncenter"
    },
    "custom/launcher":{
            "format": "≤▒ΕΖ",
            "on-click": "wofi --show drun --term kitty",
            "on-click-right": "wofi --show run --term kitty"
        },
        "custom/notification": {
    "tooltip": true,
    "format": "<span size='16pt'>{icon}</span>",
    "format-icons": {
      "notification": "≤▒Ζτ",
      "none": "≤░Γε",
      "dnd-notification": "≤░Γι",
      "dnd-none": "≤░ςΥ",
      "inhibited-notification": "≤░Γδ",
      "inhibited-none": "≤░ςΣ",
      "dnd-inhibited-notification": "≤░Γδ",
      "dnd-inhibited-none": "≤░ςΣ"
    },
    "return-type": "json",
    "exec-if": "which swaync-client",
    "exec": "swaync-client -swb",
    "on-click": "swaync-client -t -sw",
    "on-click-right": "swaync-client -d -sw",
    "escape": true
  }
}
